<!DOCTYPE html>
<html lang="{{ current_language() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('studio.page.title') }}</title>
  <link rel="stylesheet" href="/static/admin_studio.css">
</head>
<body data-tenant="{{ tenant_id }}">
  <header class="studio-header">
    <a href="/admin/samples" class="brand">{{ t('app.title') }}</a>
    <span class="studio-title">{{ t('studio.header.title') }}</span>
    <nav class="studio-nav">
      <a href="/admin/qc-model">{{ t('studio.nav.qc_model') }}</a>
      <a href="/admin/samples">{{ t('studio.nav.samples') }}</a>
    </nav>
    <div class="studio-header__actions">
      {% include "_language_switch.html" %}
    </div>
  </header>

  <div class="studio-layout">
    <!-- LEFT: SKU list / search / status filter -->
    <aside class="panel panel-left">
      <div class="panel-head">
        <h2>{{ t('studio.left.title') }}</h2>
      </div>
      <div class="sku-controls">
        <input type="search" id="sku-search" placeholder="{{ t('studio.search.placeholder') }}" autocomplete="off">
        <select id="sku-status-filter">
          <option value="">{{ t('studio.status.all') }}</option>
          {% for state in sku_lifecycle_states %}
          <option value="{{ state }}">{{ t('studio.status.' + state) }}</option>
          {% endfor %}
        </select>
      </div>
      <ul id="sku-list" class="sku-list"></ul>
    </aside>

    <!-- CENTER: conversation + input -->
    <section class="panel panel-center">
      <div class="panel-head">
        <h2>{{ t('studio.center.title') }}</h2>
        <span id="active-sku-chip" class="chip hidden"></span>
      </div>
      <div id="conversation" class="conversation" aria-live="polite"></div>

      <form id="chat-form" class="chat-input">
        <button type="button" id="voice-toggle" class="icon-btn" title="{{ t('studio.voice.title') }}">🎤</button>
        <label class="icon-btn" title="{{ t('studio.upload.title') }}">
          📎
          <input type="file" id="photo-input" accept="image/*" hidden>
        </label>
        <input type="text" id="chat-text" placeholder="{{ t('studio.chat.placeholder') }}" autocomplete="off">
        <button type="submit" class="send-btn">{{ t('studio.send') }}</button>
      </form>
    </section>

    <!-- RIGHT: SKU card + standard preview + detection points + status -->
    <aside class="panel panel-right">
      <div class="panel-head">
        <h2>{{ t('studio.right.title') }}</h2>
      </div>
      <div id="sku-card" class="sku-card empty">
        <p class="muted">{{ t('studio.empty.standard') }}</p>
      </div>
    </aside>
  </div>

  <!-- Confirmation card template rendered into the conversation -->
  <template id="confirm-card-template">
    <div class="confirm-card">
      <div class="confirm-head">{{ t('studio.confirm.head') }}</div>
      <div class="confirm-body"></div>
      <div class="confirm-actions">
        <button type="button" class="btn btn-primary confirm-yes">{{ t('studio.confirm.yes') }}</button>
        <button type="button" class="btn confirm-no">{{ t('studio.confirm.no') }}</button>
      </div>
    </div>
  </template>

  <!-- Region annotation editor (§2) — cloned into a detection point row -->
  <template id="region-editor-template">
    <div class="region-editor">
      <div class="region-editor__controls">
        <label>Photo:
          <select class="region-photo-select"></select>
        </label>
        <span class="muted region-hint">Drag on the image to draw a box.</span>
      </div>
      <div class="region-canvas-wrap">
        <img class="region-image" alt="standard photo">
        <canvas class="region-canvas"></canvas>
      </div>
      <ul class="region-list"></ul>
      <div class="region-editor__actions">
        <button type="button" class="btn btn-primary region-save">Save regions</button>
        <button type="button" class="btn region-cancel">Cancel</button>
      </div>
      <div class="region-error muted"></div>
    </div>
  </template>

  <script>
    window.GIRAFFE_STUDIO_I18N = {
      noSkus: {{ t('studio.js.no_skus') | tojson }},
      emptyStandard: {{ t('studio.empty.standard') | tojson }},
      noPhoto: {{ t('studio.js.no_photo') | tojson }},
      standardPhotoAlt: {{ t('studio.js.standard_photo_alt') | tojson }},
      expected: {{ t('studio.js.expected') | tojson }},
      noDetectionPoints: {{ t('studio.js.no_detection_points') | tojson }},
      publish: {{ t('studio.js.publish') | tojson }},
      publishing: {{ t('studio.js.publishing') | tojson }},
      published: {{ t('studio.js.published') | tojson }},
      bundleNote: {{ t('studio.js.bundle_note') | tojson }},
      publishFailed: {{ t('studio.js.publish_failed') | tojson }},
      error: {{ t('studio.js.error') | tojson }},
      expectedCountRequired: {{ t('studio.js.expected_count_required') | tojson }},
      countPlaceholder: {{ t('studio.js.count_placeholder') | tojson }},
      provideCounts: {{ t('studio.js.provide_counts') | tojson }},
      confirmedRevision: {{ t('studio.js.confirmed_revision') | tojson }},
      savedPoints: {{ t('studio.js.saved_points') | tojson }},
      rejected: {{ t('studio.js.rejected') | tojson }},
      selectBeforeUpload: {{ t('studio.js.select_before_upload') | tojson }},
      uploadingPhoto: {{ t('studio.js.uploading_photo') | tojson }},
      photoUploaded: {{ t('studio.js.photo_uploaded') | tojson }},
      uploadFailed: {{ t('studio.js.upload_failed') | tojson }},
      voiceDisabled: {{ t('studio.js.voice_disabled') | tojson }},
      welcome: {{ t('studio.js.welcome') | tojson }},
      statusLabels: {
        {% for state in sku_lifecycle_states %}
        {{ state | tojson }}: {{ t('studio.status.' + state) | tojson }}{{ "," if not loop.last }}
        {% endfor %}
      }
    };
  </script>
  <script src="/static/admin_studio.js"></script>
</body>
</html>
