<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Pad Workspace</title>
    <link rel="manifest" href="/static/pad_manifest.json">
    <link rel="stylesheet" href="/static/pad_ui.css">
</head>
<body class="workspace-page">
    <div id="orientation-overlay">
        <div class="orientation-message">
            <p>Please rotate your device to landscape mode to use QC Pad.</p>
        </div>
    </div>
    <header class="pad-header">
        <div class="pad-header-left">
            <span class="pad-logo">Giraffe QC Pad</span>
        </div>
        <div class="pad-header-right">
            <span class="operator-name">{{ operator.display_name }}</span>
            <span class="operator-lang">[{{ preferred_language }}]</span>
            <form method="POST" action="/pad/logout" style="display:inline">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </header>
    <main class="workspace-main">
        <section class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <textarea
                    id="chat-input"
                    placeholder="Type your message (English, Chinese or Japanese)..."
                    rows="3"
                ></textarea>
                <div class="chat-actions">
                    <button id="send-btn" class="btn-primary qc-action-btn">Send</button>
                    <button id="voice-btn" class="btn-secondary qc-action-btn">Voice</button>
                    <label class="btn-secondary qc-action-btn" for="image-upload">Image</label>
                    <input type="file" id="image-upload" accept="image/*" style="display:none">
                </div>
            </div>
        </section>
        <section class="info-panel">
            <div class="language-selector">
                <label>Language:</label>
                <select id="language-select">
                    <option value="en" {% if preferred_language == 'en' %}selected{% endif %}>English</option>
                    <option value="zh-CN" {% if preferred_language == 'zh-CN' %}selected{% endif %}>中文</option>
                    <option value="ja" {% if preferred_language == 'ja' %}selected{% endif %}>日本語</option>
                </select>
            </div>
            <div class="action-cards" id="action-cards">
                <p class="placeholder-text">Action cards will appear here after sending a message.</p>
            </div>
        </section>
    </main>
    <script src="/static/pad_chat.js"></script>
    <script src="/static/pad_orientation.js"></script>
</body>
</html>
