<!DOCTYPE html>
<html lang="{{ current_language() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('pad.workspace.title') }}</title>
    <link rel="manifest" href="/static/pad_manifest.json?v=2">
    <link rel="stylesheet" href="/static/pad_ui.css">
</head>
<body class="workspace-page">
    <div id="orientation-overlay">
        <div class="orientation-message">
            <p>{{ t('pad.orientation') }}</p>
        </div>
    </div>
    <header class="pad-header">
        <div class="pad-header-left">
            <span class="pad-logo">{{ t('pad.brand') }}</span>
        </div>
        <div class="pad-header-right">
            <span class="operator-name">{{ operator.display_name }}</span>
            <span class="operator-lang">[{{ preferred_language }}]</span>
            <form method="POST" action="/pad/logout" style="display:inline">
                <button type="submit" class="btn-logout">{{ t('pad.workspace.logout') }}</button>
            </form>
        </div>
    </header>
    <main class="workspace-main">
        <section class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <textarea
                    id="chat-input"
                    placeholder="{{ t('pad.workspace.chat_placeholder') }}"
                    rows="3"
                ></textarea>
                <div class="chat-actions">
                    <button id="send-btn" class="btn-primary qc-action-btn">{{ t('pad.workspace.send') }}</button>
                    <button id="voice-btn" class="btn-secondary qc-action-btn">{{ t('pad.workspace.voice') }}</button>
                    <label class="btn-secondary qc-action-btn" for="image-upload">{{ t('pad.workspace.image') }}</label>
                    <input type="file" id="image-upload" accept="image/*" style="display:none">
                </div>
            </div>
        </section>
        <section class="info-panel">
            <div class="stage2-mock-banner">{{ t('pad.control.mock_banner') }}</div>
            <section class="inspection-launcher" aria-labelledby="inspection-launcher-title">
                <h2 id="inspection-launcher-title">{{ t('pad.control.title') }}</h2>
                <p>{{ t('pad.control.help') }}</p>
                <div class="sku-search-row">
                    <input id="sku-search-input" type="search" placeholder="{{ t('pad.control.search_placeholder') }}" autocomplete="off">
                    <button id="sku-search-btn" class="btn-primary qc-action-btn">{{ t('pad.control.search') }}</button>
                </div>
                <div id="sku-search-results" class="sku-search-results"></div>
                <div id="qc-control-status" class="qc-control-status" role="status"></div>
            </section>
            <div class="language-selector">
                <label>{{ t('pad.workspace.language') }}</label>
                <select id="language-select">
                    <option value="en" {% if preferred_language == 'en' %}selected{% endif %}>English</option>
                    <option value="zh-CN" {% if preferred_language == 'zh-CN' %}selected{% endif %}>中文</option>
                    <option value="ja" {% if preferred_language == 'ja' %}selected{% endif %}>日本語</option>
                </select>
            </div>
            <div class="action-cards" id="action-cards">
                <p class="placeholder-text">{{ t('pad.workspace.cards_placeholder') }}</p>
            </div>
        </section>
    </main>
    <script>
      window.GIRAFFE_PAD_I18N = {
        confirmStandard: {{ t('pad.js.confirm_standard') | tojson }},
        edit: {{ t('pad.js.edit') | tojson }},
        reject: {{ t('pad.js.reject') | tojson }},
        confirm: {{ t('pad.js.confirm') | tojson }},
        standardActivated: {{ t('pad.js.standard_activated') | tojson }},
        voiceTranscriptHint: {{ t('pad.js.voice_transcript_hint') | tojson }},
        sendTranscript: {{ t('pad.js.send_transcript') | tojson }},
        stop: {{ t('pad.js.stop') | tojson }},
        voice: {{ t('pad.workspace.voice') | tojson }},
        standardConfirmationRequired: {{ t('pad.js.standard_confirmation_required') | tojson }},
        sourceLabel: {{ t('pad.js.source_label') | tojson }},
        standardRejected: {{ t('pad.js.standard_rejected') | tojson }},
        noReply: {{ t('pad.js.no_reply') | tojson }},
        errorPrefix: {{ t('pad.js.error_prefix') | tojson }},
        standardConfirmedPrefix: {{ t('pad.js.standard_confirmed_prefix') | tojson }},
        confirmFailedPrefix: {{ t('pad.js.confirm_failed_prefix') | tojson }},
        unknownError: {{ t('pad.js.unknown_error') | tojson }},
        voiceNotSupported: {{ t('pad.js.voice_not_supported') | tojson }}
      };
      window.GIRAFFE_PAD_CONTROL_I18N = {
        search: {{ t('pad.control.search') | tojson }},
        start: {{ t('pad.control.start') | tojson }},
        searching: {{ t('pad.control.searching') | tojson }},
        noSkus: {{ t('pad.control.no_skus') | tojson }},
        starting: {{ t('pad.control.starting') | tojson }},
        error: {{ t('pad.control.error') | tojson }}
      };
    </script>
    <script src="/static/pad_chat.js"></script>
    <script src="/static/pad_control.js"></script>
    <script src="/static/pad_orientation.js"></script>
</body>
</html>
