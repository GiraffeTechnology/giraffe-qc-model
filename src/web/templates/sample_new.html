{% extends "base.html" %}
{% block title %}New Sample — QC Sample Admin{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Sample</h1>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form class="form-card" method="post" action="/admin/samples">
  <input type="hidden" name="tenant_id" value="{{ tenant_id }}">

  <div class="form-group">
    <label for="item_number">Item Number <span class="required">*</span></label>
    <input type="text" id="item_number" name="item_number" required
           value="{{ item_number or '' }}" placeholder="ITEM-FLOWER-001">
  </div>

  <div class="form-group">
    <label for="name">Name <span class="required">*</span></label>
    <input type="text" id="name" name="name" required
           value="{{ name or '' }}" placeholder="Artificial Flower A">
  </div>

  <div class="form-group">
    <label for="category">Category</label>
    <input type="text" id="category" name="category"
           value="{{ category or '' }}" placeholder="e.g. artificial_flower">
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3"
              placeholder="Optional description">{{ description or '' }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Create Sample</button>
    <a href="/admin/samples" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
