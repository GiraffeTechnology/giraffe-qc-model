{% extends "base.html" %}
{% block title %}{{ t('sample.new.title') }} — {{ t('sample.admin.title') }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ t('sample.new.title') }}</h1>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form class="form-card" method="post" action="/admin/samples">
  <input type="hidden" name="tenant_id" value="{{ tenant_id }}">

  <div class="form-group">
    <label for="item_number">{{ t('sample.field.item_number') }} <span class="required">*</span></label>
    <input type="text" id="item_number" name="item_number" required
           value="{{ item_number or '' }}" placeholder="{{ t('sample.placeholder.item_number') }}">
  </div>

  <div class="form-group">
    <label for="name">{{ t('sample.field.name') }} <span class="required">*</span></label>
    <input type="text" id="name" name="name" required
           value="{{ name or '' }}" placeholder="{{ t('sample.placeholder.name') }}">
  </div>

  <div class="form-group">
    <label for="category">{{ t('sample.field.category') }}</label>
    <input type="text" id="category" name="category"
           value="{{ category or '' }}" placeholder="{{ t('sample.placeholder.category') }}">
  </div>

  <div class="form-group">
    <label for="description">{{ t('sample.field.description') }}</label>
    <textarea id="description" name="description" rows="3"
              placeholder="{{ t('sample.placeholder.optional_description') }}">{{ description or '' }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ t('sample.action.create') }}</button>
    <a href="/admin/samples" class="btn btn-secondary">{{ t('sample.action.cancel') }}</a>
  </div>
</form>
{% endblock %}
