name: remediation-lints

# CI_AND_MERGE_INSTRUCTIONS.md §1.3 / §1.4 — these jobs must pass (or, for the
# claims check, be reviewed) before any P0-remediation PR merges.
on:
  push:
  pull_request:

jobs:
  sensitive-info-lint:
    name: Sensitive deployment info lint (hard, §P0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail on committed real device hostnames / internal LAN addresses
        run: python scripts/ci/sensitive_info_lint.py

  mock-labeling-lint:
    name: Mock-labeling lint (§1.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail on unlabeled mock/fake patterns in production paths
        run: python scripts/ci/mock_labeling_lint.py

  prd-traceability:
    name: PRD traceability gate (hard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify PRD matrix statuses are backed by existing evidence
        run: python scripts/ci/prd_traceability_check.py

  report-evidence:
    name: Report evidence gate (hard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Reject acceptance claims without real model-call evidence
        run: python scripts/ci/report_evidence_check.py

  stage3-ab-report:
    name: Stage 3 A/B report gate (hard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Reject Stage 3 A/B reports with wrong group fields or fabricated identity
        run: python scripts/ci/stage3_ab_report_check.py

  stage3-authorization-gate:
    name: Stage 3 authorization gate (informational, always green)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Report whether Stage 3 A/B testing is currently authorized
        run: python scripts/ci/stage3_authorization_gate.py

  no-unverified-claims:
    name: No-unverified-claims check (§1.4, soft)
    runs-on: ubuntu-latest
    # Soft check per the CI instructions: annotates unbacked readiness claims
    # for reviewers instead of hard-blocking the merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Warn on readiness claims without adjacent evidence
        run: python scripts/ci/claims_lint.py
