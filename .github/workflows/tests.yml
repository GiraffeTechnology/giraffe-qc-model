name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Clean-environment reproducibility standard (WS1 / CI instructions §1.1):
      # the frozen lockfile alone must be sufficient — no ad-hoc installs.
      - name: Run tests (frozen lockfile, clean environment)
        run: |
          rm -rf .venv
          UV_CACHE_DIR=/tmp/uv-cache UV_PROJECT_ENVIRONMENT=.venv uv run --frozen pytest -q
