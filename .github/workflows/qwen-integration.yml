name: qwen-integration

on:
  workflow_dispatch:

jobs:
  qwen-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies including dev tooling
        run: uv sync --group dev

      - name: Run real Qwen integration tests
        env:
          RUN_QWEN_INTEGRATION: "1"
          QC_ENGINE_MODE: "cloud_qwen_dev"
          LLM_ENABLE_REAL_CALLS: "true"
          QWEN_CLOUD_ENABLED: "true"
          ALLOW_SEND_IMAGES_TO_CLOUD_QWEN: "true"
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: uv run pytest tests/integration/ -v
